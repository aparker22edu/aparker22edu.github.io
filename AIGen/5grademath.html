<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chief Engineer's Math Practice</title>
    <!-- React and Tailwind CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Icon Component to handle Lucide in this environment
        const Icon = ({ name, size = 24, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        setSvg(icon.toSvg({ width: size, height: size, class: className }));
                    }
                }
            }, [name, size, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const ALL_PROBLEMS = [
            { id: 1, text: "The school store bought 24 boxes of pencils. Each box contains 48 pencils. How many pencils did the store buy in total?", expression: "24 * 48", answer: "1152", hint: "Try 24 * (50 - 2) for a distributive shortcut!" },
            { id: 2, text: "On Monday it rained 1.45 inches. On Tuesday it rained 0.8 inches. How much more did it rain on Monday than on Tuesday?", expression: "1.45 - 0.8", answer: "0.65", hint: "Line up the decimals! Think of 0.8 as 0.80." },
            { id: 3, text: "The family ate 1 1/2 pizzas for lunch and 2 1/3 pizzas for dinner. How much pizza did they eat in total?", expression: "1 1/2 + 2 1/3", answer: "3 5/6", hint: "Add the whole numbers first (1 + 2), then find a common denominator for 1/2 and 1/3." },
            { id: 4, text: "A new video game costs $59.40. If Leo saves $6.60 each week, how many weeks will it take him to buy the game?", expression: "59.40 / 6.60", answer: "9", hint: "Shift the decimal! 594 / 66. Think: 66 * 10 is 660, so it must be close to 10." },
            { id: 5, text: "A wall has an area of 20 square feet. If Leo paints 3/5 of the wall blue, how many square feet are blue?", expression: "20 * 3/5", answer: "12", hint: "Divide 20 by 5 first (4), then multiply by 3." },
            { id: 6, text: "Sarah bought bananas for $2.34, milk for $3.89, and bread for $2.50. How much did she spend in total?", expression: "2.34 + 3.89 + 2.50", answer: "8.73", hint: "Add the cents first, or look for near-dollar amounts like $3.89 being almost $3.90." },
            { id: 7, text: "A wooden board is 8 3/4 feet long. Mr. Green cuts off 2 1/2 feet to build a birdhouse. How much board is left?", expression: "8 3/4 - 2 1/2", answer: "6 1/4", hint: "Subtract the whole numbers (8-2) and then fractions (3/4 - 2/4)." },
            { id: 8, text: "A local bakery made 1,248 cookies. They want to pack them into boxes that hold 12 cookies each. How many full boxes can they pack?", expression: "1248 / 12", answer: "104", hint: "1200 / 12 is 100. 48 / 12 is 4. Add them up!" },
            { id: 9, text: "A baker has 1/3 of a pan of brownies left. He wants to share them equally among 4 friends. What fraction of the whole pan does each friend get?", expression: "1/3 / 4", answer: "1/12", hint: "Dividing by 4 is the same as multiplying by 1/4." },
            { id: 10, text: "Ryan has 3 sets of cars with 12 cars in each set. His friend gives him 5 more cars. How many cars does he have now?", expression: "(3 * 12) + 5", answer: "41", hint: "Multiply the sets first, then add the bonus cars." },
            { id: 11, text: "A track is 0.25 miles long. If Marcus runs 12 laps, how many miles did he run?", expression: "12 * 0.25", answer: "3", hint: "Remember the Money Pair! 4 * 0.25 = 1.00. How many 4s are in 12?" },
            { id: 12, text: "A recipe calls for 3/4 cup of white sugar and 2/3 cup of brown sugar. How much sugar is needed in all?", expression: "3/4 + 2/3", answer: "1 5/12", hint: "Common denominator is 12. (9/12 + 8/12)." },
            { id: 13, text: "A small garden plot is 3/4 yards long and 2/5 yards wide. What is the area of the garden in square yards?", expression: "3/4 * 2/5", answer: "3/10", hint: "Multiply across! 6/20, then simplify." },
            { id: 14, text: "A group sold 10 cupcakes for $1.50 each and 5 cookies for $0.75 each. How much money did they make in total?", expression: "(10 * 1.50) + (5 * 0.75)", answer: "18.75", hint: "10 * 1.50 is easy ($15). 5 * 0.75 is like 5 quarters ($3.75). Add them!" },
            { id: 15, text: "A hiking group walked 3 1/8 miles in the morning and 4 1/2 miles in the afternoon. What was their total distance?", expression: "3 1/8 + 4 1/2", answer: "7 5/8", hint: "3 + 4 = 7. Then 1/8 + 4/8." },
            { id: 16, text: "A large jug holds 6 liters of water. If you pour the water into bottles that each hold 1/2 liter, how many bottles can you fill?", expression: "6 / (1/2)", answer: "12", hint: "Dividing by 1/2 is the same as doubling!" },
            { id: 17, text: "A teacher buys 4 books that cost $8 each. She uses a coupon for $5 off her total purchase. How much does she pay?", expression: "(4 * 8) - 5", answer: "27", hint: "Total cost minus the discount." },
            { id: 18, text: "A book has 120 pages. If Julian has read 2/3 of the book, how many pages has he read?", expression: "120 * 2/3", answer: "80", hint: "Divide 120 by 3 first (40), then double it." },
            { id: 19, text: "A trail is 5 miles long. If a hiker walks 3 5/8 miles, how much further do they have to go?", expression: "5 - 3 5/8", answer: "1 3/8", hint: "Think: 5.0 minus 3 5/8. Borrow from the 5 to make it 4 8/8." },
            { id: 20, text: "A theater has 24 rows of seats. Each row has 35 seats. How many total seats are in the theater?", expression: "24 * 35", answer: "840", hint: "Distributive: 24 * (30 + 5) or 35 * (20 + 4)." },
            { id: 21, text: "Three friends picked 48 apples total. They ate 6 apples on the way home. Then they divided the remaining apples equally. How many apples did each friend get?", expression: "(48 - 6) / 3", answer: "14", hint: "Subtract the eaten apples first, then divide by 3." },
            { id: 22, text: "One pound of apples costs $1.25. How much would 3.5 pounds of apples cost?", expression: "1.25 * 3.5", answer: "4.375", hint: "Multiply as whole numbers (125 * 35) and then place the decimal." },
            { id: 23, text: "Maya mixed 1/2 liter of orange juice, 1/4 liter of pineapple juice, and 3/8 liter of apple juice. How many liters of juice does she have now?", expression: "1/2 + 1/4 + 3/8", answer: "1 1/8", hint: "Convert everything to eighths! 4/8 + 2/8 + 3/8." },
            { id: 24, text: "There are 455 students going on a field trip. Each bus holds 50 students. How many buses are needed to carry everyone?", expression: "455 / 50", answer: "10", hint: "9 buses would be 450 students. You need one more bus for the last 5 people!" },
            { id: 25, text: "Sarah buys a notebook for $3.45 and a pack of pens for $5.20. She pays with a $20 bill. How much change should she receive?", expression: "20 - (3.45 + 5.20)", answer: "11.35", hint: "Add the items first, then subtract from 20.00." }
        ];

        const App = () => {
            const [currentPage, setCurrentPage] = useState(0);
            const [userInputs, setUserInputs] = useState({});
            const [checked, setChecked] = useState({});
            const [startTime, setStartTime] = useState(Date.now());
            const [elapsedTime, setElapsedTime] = useState(0);
            const [showHints, setShowHints] = useState({});
            const [isComplete, setIsComplete] = useState(false);

            const problemsPerPage = 5;
            const currentProblems = ALL_PROBLEMS.slice(currentPage * problemsPerPage, (currentPage + 1) * problemsPerPage);

            useEffect(() => {
                const timer = setInterval(() => {
                    if (!isComplete) {
                        setElapsedTime(Math.floor((Date.now() - startTime) / 1000));
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [startTime, isComplete]);

            const handleInputChange = (id, field, value) => {
                setUserInputs(prev => ({
                    ...prev,
                    [id]: { ...prev[id], [field]: value }
                }));
            };

            const checkAnswers = () => {
                const newChecked = { ...checked };
                currentProblems.forEach(p => {
                    const sol = userInputs[p.id]?.solution?.trim();
                    if (sol === p.answer || sol === p.answer.replace(/\s/g, '')) {
                        newChecked[p.id] = 'correct';
                    } else if (sol) {
                        newChecked[p.id] = 'wrong';
                    }
                });
                setChecked(newChecked);
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const nextPage = () => {
                if (currentPage < 4) {
                    setCurrentPage(prev => prev + 1);
                    window.scrollTo(0, 0);
                } else {
                    setIsComplete(true);
                }
            };

            const prevPage = () => {
                if (currentPage > 0) setCurrentPage(prev => prev - 1);
            };

            const toggleHint = (id) => {
                setShowHints(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const resetGame = () => {
                setCurrentPage(0);
                setUserInputs({});
                setChecked({});
                setStartTime(Date.now());
                setIsComplete(false);
                setShowHints({});
            };

            if (isComplete) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center border border-slate-100">
                            <div className="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Icon name="trophy" size={40} className="text-yellow-600" />
                            </div>
                            <h1 className="text-3xl font-bold text-slate-800 mb-2">Mission Accomplished!</h1>
                            <p className="text-slate-500 mb-8 text-lg">You completed all 25 problems in 5 stages.</p>
                            
                            <div className="bg-slate-50 rounded-2xl p-6 mb-8 flex justify-around">
                                <div>
                                    <p className="text-sm text-slate-400 uppercase font-bold tracking-wider">Total Time</p>
                                    <p className="text-2xl font-mono font-bold text-slate-700">{formatTime(elapsedTime)}</p>
                                </div>
                                <div>
                                    <p className="text-sm text-slate-400 uppercase font-bold tracking-wider">Accuracy</p>
                                    <p className="text-2xl font-mono font-bold text-slate-700">100%</p>
                                </div>
                            </div>

                            <button onClick={resetGame} className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all flex items-center justify-center gap-2 text-lg">
                                <Icon name="refresh-ccw" size={20} /> Try Again
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 pb-20">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-600 text-white p-2 rounded-xl">
                                    <Icon name="clock" size={24} />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold leading-none">Math Practice</h1>
                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-tighter">Level {currentPage + 1} of 5</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden sm:block">
                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">Stamina Timer</p>
                                    <p className="text-xl font-mono font-bold text-indigo-600">{formatTime(elapsedTime)}</p>
                                </div>
                                <div className="w-12 h-12 rounded-full border-4 border-slate-100 flex items-center justify-center relative">
                                   <svg className="w-full h-full transform -rotate-90">
                                     <circle cx="24" cy="24" r="20" stroke="currentColor" strokeWidth="4" fill="transparent" className="text-slate-100" />
                                     <circle cx="24" cy="24" r="20" stroke="currentColor" strokeWidth="4" fill="transparent" 
                                             strokeDasharray={126}
                                             strokeDashoffset={126 - (126 * (currentPage + 1) / 5)}
                                             className="text-indigo-600" />
                                   </svg>
                                   <span className="absolute text-xs font-bold">{currentPage + 1}/5</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto px-4 mt-8">
                        <div className="space-y-8">
                            {currentProblems.map((p, idx) => (
                                <div key={p.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8 transition-all overflow-hidden relative">
                                    {checked[p.id] === 'correct' && (
                                        <div className="absolute top-4 right-4 text-emerald-500 animate-bounce">
                                            <Icon name="check-circle-2" size={32} />
                                        </div>
                                    )}
                                    
                                    <div className="flex items-start gap-4">
                                        <span className="bg-slate-100 text-slate-500 w-8 h-8 rounded-lg flex items-center justify-center font-bold flex-shrink-0">
                                            {idx + 1 + (currentPage * 5)}
                                        </span>
                                        <p className="text-lg md:text-xl font-medium text-slate-700 leading-relaxed pt-0.5">
                                            {p.text}
                                        </p>
                                    </div>

                                    <div className="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold uppercase tracking-widest text-slate-400 px-1">Write Expression</label>
                                            <input 
                                                type="text" 
                                                placeholder="e.g. 5 + (3 * 2)"
                                                value={userInputs[p.id]?.expression || ''}
                                                onChange={(e) => handleInputChange(p.id, 'expression', e.target.value)}
                                                className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-2xl p-4 text-lg outline-none transition-all font-mono"
                                            />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold uppercase tracking-widest text-slate-400 px-1">Final Solution</label>
                                            <div className="relative">
                                                <input 
                                                    type="text" 
                                                    placeholder="Answer"
                                                    value={userInputs[p.id]?.solution || ''}
                                                    onChange={(e) => handleInputChange(p.id, 'solution', e.target.value)}
                                                    className={`w-full bg-slate-50 border-2 rounded-2xl p-4 text-lg outline-none transition-all font-mono pr-12 ${
                                                        checked[p.id] === 'correct' ? 'border-emerald-500 bg-emerald-50' : 
                                                        checked[p.id] === 'wrong' ? 'border-rose-400 bg-rose-50' : 'border-transparent focus:border-indigo-500 focus:bg-white'
                                                    }`}
                                                />
                                                {checked[p.id] === 'wrong' && (
                                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 text-rose-500"><Icon name="x-circle" size={24} /></div>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-6 flex items-center justify-between">
                                        <button onClick={() => toggleHint(p.id)} className="text-indigo-600 flex items-center gap-1.5 text-sm font-bold hover:bg-indigo-50 px-3 py-1.5 rounded-lg transition-colors">
                                            <Icon name="lightbulb" size={16} /> {showHints[p.id] ? "Hide Hint" : "Engineer's Hint"}
                                        </button>
                                        {checked[p.id] === 'wrong' && (
                                            <span className="text-xs font-bold text-rose-500 italic">Try again! Remember to double check the logic.</span>
                                        )}
                                    </div>

                                    {showHints[p.id] && (
                                        <div className="mt-4 p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                                            <p className="text-indigo-700 text-sm italic font-medium">{p.hint}</p>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        <div className="mt-12 flex flex-col sm:flex-row items-center justify-between gap-6 pb-10">
                            <button onClick={prevPage} disabled={currentPage === 0} className="flex items-center gap-2 font-bold text-slate-500 hover:text-slate-900 disabled:opacity-30 disabled:cursor-not-allowed transition-all">
                                <Icon name="chevron-left" /> Previous Stage
                            </button>
                            <button onClick={checkAnswers} className="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 hover:scale-[1.02] active:scale-95 transition-all text-lg">
                                Check My Work
                            </button>
                            <button onClick={nextPage} className="flex items-center gap-2 font-bold text-indigo-600 hover:text-indigo-800 transition-all group">
                                {currentPage === 4 ? "Finish Test" : "Next Stage"} <div className="group-hover:translate-x-1 transition-transform"><Icon name="chevron-right" /></div>
                            </button>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
